name: Parse, build and deploy

on:
  # Парсинг по расписанию приостановлен. Раскомментируйте строку ниже чтобы возобновить.
  # schedule:
  #   - cron: "17 */3 * * *"
  workflow_dispatch:
    inputs:
      skip_parser:
        description: "Skip parser (build only)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  parse:
    if: ${{ github.event_name != 'push' && inputs.skip_parser != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run parser
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          LOG_LEVEL: INFO
          DRY_RUN: "false"
        run: python -m src.main

      - name: Commit new content
        run: |
          git config user.name "glyanec-bot"
          git config user.email "bot@users.noreply.github.com"
          git add web/src/content/articles web/public/images/articles pipeline/data || true
          if git diff --cached --quiet; then
            echo "No new content."
          else
            git commit -m "chore(content): auto-publish $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  build:
    needs: [parse]
    if: ${{ always() && (needs.parse.result == 'success' || needs.parse.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: web
        run: npm ci || npm install

      - name: Build Astro
        working-directory: web
        env:
          SITE: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
